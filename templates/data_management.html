<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据管理 - 苹果品质分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .table-container {
            max-height: 600px;
            overflow-y: auto;
        }
        .change-highlight {
            background-color: #fff3cd !important;
            animation: fadeHighlight 3s ease-out;
        }
        @keyframes fadeHighlight {
            0% { background-color: #d4edda; }
            100% { background-color: transparent; }
        }
        .operation-badge {
            font-size: 0.75em;
        }
        .btn-group-sm .btn {
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
        }
        .modal-lg {
            max-width: 800px;
        }
        .form-floating {
            margin-bottom: 1rem;
        }
        .change-log {
            max-height: 300px;
            overflow-y: auto;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1055;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-apple-alt me-2"></i>苹果品质分析系统
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/"><i class="fas fa-home me-1"></i>首页</a>
                <a class="nav-link" href="/data_browse"><i class="fas fa-table me-1"></i>数据浏览</a>
                <a class="nav-link" href="/visualization"><i class="fas fa-chart-bar me-1"></i>数据可视化</a>
                <a class="nav-link active" href="/data_management"><i class="fas fa-cogs me-1"></i>数据管理</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- 主要内容区域 -->
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">
                            <i class="fas fa-database me-2"></i>数据管理
                        </h5>
                        <div class="btn-group" role="group">
                            <button type="button" class="btn btn-success btn-sm" onclick="showAddModal()">
                                <i class="fas fa-plus me-1"></i>新增
                            </button>
                            <button type="button" class="btn btn-info btn-sm" onclick="refreshData()">
                                <i class="fas fa-sync-alt me-1"></i>刷新
                            </button>
                            <button type="button" class="btn btn-warning btn-sm" onclick="showSimulateModal()">
                                <i class="fas fa-robot me-1"></i>模拟数据
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- 过滤器 -->
                        <div class="row mb-3">
                            <div class="col-md-3">
                                <select class="form-select form-select-sm" id="qualityFilter">
                                    <option value="">所有品质</option>
                                    <option value="good">优质</option>
                                    <option value="bad">劣质</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <input type="number" class="form-control form-control-sm" id="minSizeFilter" placeholder="最小尺寸" step="0.1">
                            </div>
                            <div class="col-md-3">
                                <input type="number" class="form-control form-control-sm" id="maxSizeFilter" placeholder="最大尺寸" step="0.1">
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-outline-primary btn-sm w-100" onclick="applyFilters()">
                                    <i class="fas fa-filter me-1"></i>筛选
                                </button>
                            </div>
                        </div>

                        <!-- 数据表格 -->
                        <div class="table-container">
                            <table class="table table-striped table-hover table-sm">
                                <thead class="table-dark sticky-top">
                                    <tr>
                                        <th>ID</th>
                                        <th>大小</th>
                                        <th>重量</th>
                                        <th>甜度</th>
                                        <th>脆度</th>
                                        <th>多汁程度</th>
                                        <th>成熟度</th>
                                        <th>酸度</th>
                                        <th>品质</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="dataTableBody">
                                    <!-- 数据将通过JavaScript动态加载 -->
                                </tbody>
                            </table>
                        </div>

                        <!-- 分页 -->
                        <nav aria-label="数据分页">
                            <ul class="pagination pagination-sm justify-content-center" id="pagination">
                                <!-- 分页将通过JavaScript动态生成 -->
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>

            <!-- 侧边栏 - 变化历史 -->
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header">
                        <h6 class="mb-0">
                            <i class="fas fa-history me-2"></i>变化历史
                        </h6>
                    </div>
                    <div class="card-body p-0">
                        <div class="change-log" id="changeLog">
                            <!-- 变化历史将通过JavaScript动态加载 -->
                        </div>
                    </div>
                </div>

                <!-- 统计信息 -->
                <div class="card mt-3">
                    <div class="card-header">
                        <h6 class="mb-0">
                            <i class="fas fa-chart-pie me-2"></i>统计信息
                        </h6>
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-4">
                                <div class="text-primary">
                                    <i class="fas fa-database fa-2x"></i>
                                    <div class="mt-1">
                                        <strong id="totalRecords">{{ total_records }}</strong>
                                        <small class="d-block text-muted">总记录</small>
                                    </div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="text-success">
                                    <i class="fas fa-thumbs-up fa-2x"></i>
                                    <div class="mt-1">
                                        <strong id="goodRecords">-</strong>
                                        <small class="d-block text-muted">优质</small>
                                    </div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="text-danger">
                                    <i class="fas fa-thumbs-down fa-2x"></i>
                                    <div class="mt-1">
                                        <strong id="badRecords">-</strong>
                                        <small class="d-block text-muted">劣质</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑模态框 -->
    <div class="modal fade" id="recordModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="recordModalTitle">新增记录</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="recordForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="number" class="form-control" id="size" step="0.01" required>
                                    <label for="size">大小</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="number" class="form-control" id="weight" step="0.01" required>
                                    <label for="weight">重量</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="number" class="form-control" id="sweetness" step="0.01" required>
                                    <label for="sweetness">甜度</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="number" class="form-control" id="crunchiness" step="0.01" required>
                                    <label for="crunchiness">脆度</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="number" class="form-control" id="juiciness" step="0.01" required>
                                    <label for="juiciness">多汁程度</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="number" class="form-control" id="ripeness" step="0.01" required>
                                    <label for="ripeness">成熟度</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="number" class="form-control" id="acidity" step="0.01" required>
                                    <label for="acidity">酸度</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <select class="form-select" id="quality" required>
                                        <option value="">选择品质</option>
                                        <option value="good">优质</option>
                                        <option value="bad">劣质</option>
                                    </select>
                                    <label for="quality">品质</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveRecord()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 模拟数据模态框 -->
    <div class="modal fade" id="simulateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">模拟数据变化</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="simulateCount" class="form-label">模拟次数</label>
                        <input type="number" class="form-control" id="simulateCount" value="5" min="1" max="20">
                    </div>
                    <div class="mb-3">
                        <label for="simulateOperation" class="form-label">操作类型</label>
                        <select class="form-select" id="simulateOperation">
                            <option value="random">随机操作</option>
                            <option value="insert">仅新增</option>
                            <option value="update">仅更新</option>
                            <option value="delete">仅删除</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-warning" onclick="triggerSimulation()">开始模拟</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 通知容器 -->
    <div class="toast-container" id="toastContainer">
        <!-- Toast 通知将通过JavaScript动态添加 -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 全局变量
        let currentData = [];
        let currentPage = 0;
        let pageSize = 20;
        let totalRecords = 0;
        let editingRecordId = null;

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            loadChangeHistory();
            updateStatistics();
            
            // 设置定时刷新变化历史
            setInterval(loadChangeHistory, 5000);
        });

        // 加载数据
        function loadData(page = 0) {
            const filters = getFilters();
            const params = new URLSearchParams({
                limit: pageSize,
                offset: page * pageSize,
                ...filters
            });

            fetch(`/api/data/list?${params}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        currentData = data.data;
                        totalRecords = data.total;
                        currentPage = page;
                        
                        renderDataTable();
                        renderPagination();
                        updateStatistics();
                    } else {
                        showToast('加载数据失败: ' + data.error, 'error');
                    }
                })
                .catch(error => {
                    console.error('加载数据失败:', error);
                    showToast('加载数据失败', 'error');
                });
        }

        // 获取过滤条件
        function getFilters() {
            const filters = {};
            
            const quality = document.getElementById('qualityFilter').value;
            if (quality) filters.quality = quality;
            
            const minSize = document.getElementById('minSizeFilter').value;
            if (minSize) filters.min_size = minSize;
            
            const maxSize = document.getElementById('maxSizeFilter').value;
            if (maxSize) filters.max_size = maxSize;
            
            return filters;
        }

        // 应用过滤器
        function applyFilters() {
            loadData(0);
        }

        // 渲染数据表格
        function renderDataTable() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';

            currentData.forEach(record => {
                const row = document.createElement('tr');
                row.id = `row-${record.a_id}`;
                
                const qualityBadge = record.quality === 'good' ? 
                    '<span class="badge bg-success">优质</span>' : 
                    '<span class="badge bg-danger">劣质</span>';

                row.innerHTML = `
                    <td>${record.a_id}</td>
                    <td>${record.size}</td>
                    <td>${record.weight}</td>
                    <td>${record.sweetness}</td>
                    <td>${record.crunchiness}</td>
                    <td>${record.juiciness}</td>
                    <td>${record.ripeness}</td>
                    <td>${record.acidity}</td>
                    <td>${qualityBadge}</td>
                    <td>
                        <div class="btn-group btn-group-sm" role="group">
                            <button type="button" class="btn btn-outline-primary" onclick="editRecord(${record.a_id})" title="编辑">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button type="button" class="btn btn-outline-danger" onclick="deleteRecord(${record.a_id})" title="删除">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                
                tbody.appendChild(row);
            });
        }

        // 渲染分页
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            const totalPages = Math.ceil(totalRecords / pageSize);
            
            if (totalPages <= 1) return;

            // 上一页
            const prevLi = document.createElement('li');
            prevLi.className = `page-item ${currentPage === 0 ? 'disabled' : ''}`;
            prevLi.innerHTML = `<a class="page-link" href="#" onclick="loadData(${currentPage - 1})">上一页</a>`;
            pagination.appendChild(prevLi);

            // 页码
            const startPage = Math.max(0, currentPage - 2);
            const endPage = Math.min(totalPages - 1, currentPage + 2);

            for (let i = startPage; i <= endPage; i++) {
                const li = document.createElement('li');
                li.className = `page-item ${i === currentPage ? 'active' : ''}`;
                li.innerHTML = `<a class="page-link" href="#" onclick="loadData(${i})">${i + 1}</a>`;
                pagination.appendChild(li);
            }

            // 下一页
            const nextLi = document.createElement('li');
            nextLi.className = `page-item ${currentPage >= totalPages - 1 ? 'disabled' : ''}`;
            nextLi.innerHTML = `<a class="page-link" href="#" onclick="loadData(${currentPage + 1})">下一页</a>`;
            pagination.appendChild(nextLi);
        }

        // 显示新增模态框
        function showAddModal() {
            editingRecordId = null;
            document.getElementById('recordModalTitle').textContent = '新增记录';
            document.getElementById('recordForm').reset();
            new bootstrap.Modal(document.getElementById('recordModal')).show();
        }

        // 编辑记录
        function editRecord(recordId) {
            const record = currentData.find(r => r.a_id === recordId);
            if (!record) return;

            editingRecordId = recordId;
            document.getElementById('recordModalTitle').textContent = '编辑记录';
            
            // 填充表单
            document.getElementById('size').value = record.size;
            document.getElementById('weight').value = record.weight;
            document.getElementById('sweetness').value = record.sweetness;
            document.getElementById('crunchiness').value = record.crunchiness;
            document.getElementById('juiciness').value = record.juiciness;
            document.getElementById('ripeness').value = record.ripeness;
            document.getElementById('acidity').value = record.acidity;
            document.getElementById('quality').value = record.quality;

            new bootstrap.Modal(document.getElementById('recordModal')).show();
        }

        // 保存记录
        function saveRecord() {
            const formData = {
                size: parseFloat(document.getElementById('size').value),
                weight: parseFloat(document.getElementById('weight').value),
                sweetness: parseFloat(document.getElementById('sweetness').value),
                crunchiness: parseFloat(document.getElementById('crunchiness').value),
                juiciness: parseFloat(document.getElementById('juiciness').value),
                ripeness: parseFloat(document.getElementById('ripeness').value),
                acidity: parseFloat(document.getElementById('acidity').value),
                quality: document.getElementById('quality').value
            };

            const url = editingRecordId ? `/api/data/${editingRecordId}` : '/api/data';
            const method = editingRecordId ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showToast(editingRecordId ? '记录更新成功' : '记录创建成功', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('recordModal')).hide();
                    loadData(currentPage);
                    loadChangeHistory();
                    
                    // 高亮变化的行
                    setTimeout(() => {
                        const row = document.getElementById(`row-${data.data.a_id}`);
                        if (row) {
                            row.classList.add('change-highlight');
                            setTimeout(() => row.classList.remove('change-highlight'), 3000);
                        }
                    }, 500);
                } else {
                    showToast('保存失败: ' + data.error, 'error');
                }
            })
            .catch(error => {
                console.error('保存失败:', error);
                showToast('保存失败', 'error');
            });
        }

        // 删除记录
        function deleteRecord(recordId) {
            if (!confirm('确定要删除这条记录吗？')) return;

            fetch(`/api/data/${recordId}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showToast('记录删除成功', 'success');
                    loadData(currentPage);
                    loadChangeHistory();
                } else {
                    showToast('删除失败: ' + data.error, 'error');
                }
            })
            .catch(error => {
                console.error('删除失败:', error);
                showToast('删除失败', 'error');
            });
        }

        // 显示模拟模态框
        function showSimulateModal() {
            new bootstrap.Modal(document.getElementById('simulateModal')).show();
        }

        // 触发模拟
        function triggerSimulation() {
            const count = parseInt(document.getElementById('simulateCount').value);
            const operation = document.getElementById('simulateOperation').value;

            fetch('/api/data/simulate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    count: count,
                    operation: operation
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showToast(`模拟完成: 成功${data.summary.success}次，失败${data.summary.failed}次`, 'success');
                    bootstrap.Modal.getInstance(document.getElementById('simulateModal')).hide();
                    loadData(currentPage);
                    loadChangeHistory();
                } else {
                    showToast('模拟失败: ' + data.error, 'error');
                }
            })
            .catch(error => {
                console.error('模拟失败:', error);
                showToast('模拟失败', 'error');
            });
        }

        // 加载变化历史
        function loadChangeHistory() {
            fetch('/api/data/changes?limit=20')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        renderChangeHistory(data.data);
                    }
                })
                .catch(error => {
                    console.error('加载变化历史失败:', error);
                });
        }

        // 渲染变化历史
        function renderChangeHistory(changes) {
            const changeLog = document.getElementById('changeLog');
            changeLog.innerHTML = '';

            changes.forEach(change => {
                const div = document.createElement('div');
                div.className = 'border-bottom p-2';
                
                const operationClass = {
                    'insert': 'success',
                    'update': 'warning',
                    'delete': 'danger'
                }[change.operation] || 'secondary';

                const operationText = {
                    'insert': '新增',
                    'update': '更新',
                    'delete': '删除'
                }[change.operation] || change.operation;

                const triggerText = change.user_triggered ? '手动' : '自动';

                div.innerHTML = `
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <span class="badge bg-${operationClass} operation-badge">${operationText}</span>
                            <span class="badge bg-secondary operation-badge">${triggerText}</span>
                            <small class="text-muted ms-2">ID: ${change.record_id}</small>
                        </div>
                        <small class="text-muted">${new Date(change.change_time).toLocaleString()}</small>
                    </div>
                    ${change.changed_fields ? `<small class="text-muted">字段: ${JSON.parse(change.changed_fields).join(', ')}</small>` : ''}
                `;
                
                changeLog.appendChild(div);
            });
        }

        // 更新统计信息
        function updateStatistics() {
            document.getElementById('totalRecords').textContent = totalRecords;
            
            // 计算品质统计
            const goodCount = currentData.filter(r => r.quality === 'good').length;
            const badCount = currentData.filter(r => r.quality === 'bad').length;
            
            document.getElementById('goodRecords').textContent = goodCount;
            document.getElementById('badRecords').textContent = badCount;
        }

        // 刷新数据
        function refreshData() {
            loadData(currentPage);
            loadChangeHistory();
            showToast('数据已刷新', 'info');
        }

        // 显示Toast通知
        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toastContainer');
            const toastId = 'toast-' + Date.now();
            
            const bgClass = {
                'success': 'bg-success',
                'error': 'bg-danger',
                'warning': 'bg-warning',
                'info': 'bg-info'
            }[type] || 'bg-info';

            const toastHtml = `
                <div class="toast ${bgClass} text-white" id="${toastId}" role="alert">
                    <div class="toast-body">
                        ${message}
                        <button type="button" class="btn-close btn-close-white float-end" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            `;
            
            toastContainer.insertAdjacentHTML('beforeend', toastHtml);
            
            const toastElement = document.getElementById(toastId);
            const toast = new bootstrap.Toast(toastElement, { delay: 3000 });
            toast.show();
            
            // 自动移除
            toastElement.addEventListener('hidden.bs.toast', () => {
                toastElement.remove();
            });
        }
    </script>
</body>
</html>
